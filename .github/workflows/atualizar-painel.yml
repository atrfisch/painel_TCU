# .github/workflows/atualizar-painel.yml
#
# Estrutura no repositório:
#   coleta.py
#   requirements.txt        -> requests e pypdf
#   site/index.html
#   site/dados.json         -> gerado aqui
#   .github/workflows/atualizar-painel.yml
#
# Settings > Pages > Source = "GitHub Actions"
# Settings > Actions > General > Workflow permissions = "Read and write"

name: Atualizar painel TCU

on:
  schedule:
    - cron: "0 9 * * 1-5"
    - cron: "0 18 * * 1-5"
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["site/index.html", "coleta.py", "requirements.txt"]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: painel-tcu
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Dependências
        run: |
          pip install -r requirements.txt
          python -c "import requests; print('ok')"

      - name: Coletar
        run: |
          set +e
          python coleta.py --saida site/dados.json --verbose 2>&1 | tee /tmp/c.log
          codigo=${PIPESTATUS[0]}
          set -e
          if [ "$codigo" -ne 0 ]; then
            echo "::warning::Coleta terminou com código $codigo; o site segue com os dados anteriores."
            tail -n 30 /tmp/c.log
          fi
          exit 0

      - name: Commitar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/dados.json
          if git diff --cached --quiet; then echo "sem mudanças"; exit 0; fi
          git commit -m "dados: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push || { echo "::error::push recusado — marque 'Read and write permissions' em Settings > Actions > General."; exit 1; }

      - uses: actions/upload-pages-artifact@v3
        with: { path: site }

  publicar:
    needs: coletar
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
